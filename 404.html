<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirigiendo · Chirp</title>
<script>
(function () {
  var path = location.pathname || "";
  var parts = path.split("/").filter(Boolean);

  var target = "/home.html";

  if (parts[0] === "chirp" && parts[1]) {
    target = "/chirp.html";
  } else if (parts[0] === "u" && parts[1]) {
    target = "/u.html";
  } else if (parts.length === 1 && parts[0] && !parts[0].includes(".")) {
    target = "/u.html";
  }

  fetch(target, { cache: "no-store" })
    .then(function (response) {
      if (!response.ok) throw new Error("No se pudo cargar " + target);
      return response.text();
    })
    .then(function (html) {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function () {
      location.replace(target);
    });
})();
</script>
</head>
<body>Redirigiendo…</body>
</html>
