<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Redirigiendo · Chirp</title>
<script>
(function () {
  var path = location.pathname || "";
  var parts = path.split("/").filter(Boolean);

  if (parts[0] === "chirp" && parts[1]) {
    location.replace("/chirp.html?id=" + encodeURIComponent(decodeURIComponent(parts[1])));
    return;
  }

  if (parts[0] === "embed" && parts[1]) {
    location.replace("/embed.html?chirp=" + encodeURIComponent(decodeURIComponent(parts[1])));
    return;
  }

  if (parts[0] === "u" && parts[1]) {
    location.replace("/u.html?username=" + encodeURIComponent(decodeURIComponent(parts[1])));
    return;
  }

  if (parts.length === 1 && parts[0] && !parts[0].includes(".")) {
    location.replace("/u.html?username=" + encodeURIComponent(decodeURIComponent(parts[0])));
    return;
  }

  location.replace("/home.html");
})();
</script>
</head>
<body>Redirigiendo…</body>
</html>
