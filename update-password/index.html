<div class="auth-layout">
  <section class="auth-art"><div class="auth-art__inner"><div><a class="brand" href="/"><img src="/assets/logo-duck.png" alt="Logo de Chirp"><span>Chirp</span></a><h1>Tu lugar para chirpear con un look más fino.</h1><p>Más limpio, más moderno y con el patito rosa como sello visual.</p></div><div class="chip">🐣 Patito rosa incluido</div></div></section>
  <main class="auth-panel"><section class="card auth-card"><a class="brand" href="/"><img src="/assets/logo-duck.png" alt="Logo de Chirp"><span>Chirp</span></a><h1>Nueva contraseña</h1><p>Creá una contraseña nueva y volvé a Chirp.</p><form id="updatePasswordForm" class="form-grid">
          <label class="field"><span>Nueva contraseña</span><div class="fieldbox"><input id="newPassword" type="password" autocomplete="new-password" minlength="6" required placeholder="Nueva contraseña"></div></label>
          <button class="btn btn-primary btn-wide" type="submit">Guardar contraseña</button>
        </form></section></main>
