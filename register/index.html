<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#ff4aa6"><link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml"><link rel="manifest" href="/assets/brand/manifest.webmanifest"><link rel="stylesheet" href="/css/base.css"><link rel="stylesheet" href="/css/auth.css"><title>Crear cuenta — Chirp</title></head><body><main class="auth-shell"><section class="auth-art"><a class="auth-mini" href="/"><img src="/assets/brand/favicon.svg" alt="">Chirp</a><div><h1>Tu cuenta rosa empieza acá.</h1><p>Creá tu perfil, elegí tu nombre y preparate para chirpear.</p></div><small>🐣 Rosa, dulce y veloz.</small></section><section class="auth-card-wrap"><div class="auth-card"><h2>Crear cuenta</h2><p class="sub">Te vamos a mandar un email para confirmar que sos vos.</p><form id="register-form" class="form-grid"><label><span class="label">Nombre</span><input class="input" name="display_name" maxlength="50" required></label><label><span class="label">Email</span><input class="input" name="email" type="email" autocomplete="email" required></label><label><span class="label">Contraseña</span><input class="input" name="password" type="password" minlength="8" autocomplete="new-password" required></label><div id="password-meter" class="password-meter"><span></span></div><button class="btn primary" type="submit">Crear cuenta</button></form><div id="register-done" class="success-panel hidden"><b>Revisá tu email 💌</b><br>Te mandamos el link para confirmar tu cuenta Chirp.</div><p class="switch-link">¿Ya tenés cuenta? <a href="/login/">Entrar</a></p></div></section></main><script type="module" src="/js/pages/register.js"></script></body></html>
