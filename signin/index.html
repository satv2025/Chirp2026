<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fff6fb">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/feed.css">
<link rel="stylesheet" href="/css/player.css">
<link rel="stylesheet" href="/css/responsive.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>


<title>Entrar · Chirp</title>
</head>
<body>

<div class="auth-layout">
  <section class="auth-art"><div class="auth-art__inner"><div><a class="brand" href="/"><img src="/assets/logo.svg" alt="Chirp"><span>Chirp</span></a><h1>Tu espacio para chirpear con estilo.</h1><p>Rosa, rápido y con una experiencia social que se siente propia.</p></div><div class="chip">🐣 Patito rosa incluido</div></div></section>
  <main class="auth-panel"><section class="card auth-card"><a class="brand" href="/"><img src="/assets/logo.svg" alt="Chirp"><span>Chirp</span></a><h1>Entrar a Chirp</h1><p>Volvé a tu timeline y seguí chirpeando sin perder el mood.</p><form id="loginForm" class="form-grid">
          <label class="field"><span>Email</span><div class="fieldbox"><input id="loginEmail" type="email" autocomplete="email" required placeholder="vos@email.com"></div></label>
          <label class="field"><span>Contraseña</span><div class="fieldbox"><input id="loginPassword" type="password" autocomplete="current-password" required placeholder="Tu contraseña"></div></label>
          <button class="btn btn-primary btn-wide" type="submit">Entrar</button>
        </form>
        <form id="magicForm" class="form-grid" style="margin-top:14px;">
          <label class="field"><span>Link mágico</span><div class="fieldbox"><input id="magicEmail" type="email" placeholder="tu@email.com"></div></label>
          <button class="btn btn-soft btn-wide" type="submit">Mandarme link para entrar</button>
        </form>
        <p style="margin-top:16px;">¿No tenés cuenta? <a href="/register/"><b>Creala acá</b></a> · <a href="/reset/"><b>Olvidé mi contraseña</b></a></p></section></main>
</div>

<script type="module" src="/js/auth.js"></script>
</body>
</html>
