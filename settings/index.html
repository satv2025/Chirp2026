<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#ff4aa6"><link rel="icon" href="/assets/brand/favicon.svg" type="image/svg+xml"><link rel="manifest" href="/assets/brand/manifest.webmanifest"><link rel="stylesheet" href="/css/base.css"><link rel="stylesheet" href="/css/app.css"><title>Ajustes — Chirp</title></head><body><div id="app-shell" class="app-shell"><main id="main" class="main"><section class="settings-grid"><form id="profile-settings" class="panel form-grid"><h3>Perfil</h3><label><span class="label">Usuario</span><input class="input" name="username" required></label><label><span class="label">Nombre</span><input class="input" name="display_name" maxlength="50" required></label><label><span class="label">Bio</span><textarea class="textarea" name="bio" maxlength="280"></textarea></label><label><span class="label">Web</span><input class="input" name="website"></label><label><span class="label">Ubicación</span><input class="input" name="location"></label><label class="file-pill">🐣 Avatar<input name="avatar" type="file" accept="image/*"></label><label class="file-pill">🌸 Banner<input name="banner" type="file" accept="image/*"></label><label><input name="is_private" type="checkbox"> Cuenta privada</label><button class="btn primary">Guardar perfil</button></form><form id="account-settings" class="panel form-grid"><h3>Preferencias</h3><label><span class="label">Tema</span><select class="select" name="theme"><option value="system">Sistema</option><option value="light">Claro</option><option value="dark">Oscuro</option></select></label><label><input name="email_notifications" type="checkbox"> Notificaciones por email</label><label><input name="push_notifications" type="checkbox"> Notificaciones push</label><button class="btn primary">Guardar preferencias</button></form><form id="email-form" class="panel form-grid"><h3>Cambiar email</h3><label><span class="label">Email actual</span><input class="input" name="current_email" disabled></label><label><span class="label">Nuevo email</span><input class="input" name="new_email" type="email" required></label><button class="btn primary">Enviar confirmación</button></form><form id="password-form" class="panel form-grid"><h3>Cambiar contraseña</h3><label><span class="label">Nueva contraseña</span><input class="input" name="password" type="password" minlength="8" required></label><label><span class="label">Repetir contraseña</span><input class="input" name="password_confirm" type="password" minlength="8" required></label><button class="btn primary">Cambiar contraseña</button></form><form id="support-form" class="panel form-grid"><h3>Soporte</h3><label><span class="label">Tipo</span><select class="select" name="type"><option value="account">Cuenta</option><option value="security">Seguridad</option><option value="bug">Error</option><option value="other">Otra cosa</option></select></label><label><span class="label">Asunto</span><input class="input" name="subject" required></label><label><span class="label">Mensaje</span><textarea class="textarea" name="message" required></textarea></label><button class="btn primary">Enviar a soporte</button></form></section></main><aside class="rightbar"></aside></div><script type="module" src="/js/pages/settings.js"></script></body></html>
