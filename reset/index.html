<div class="auth-layout">
  <section class="auth-art"><div class="auth-art__inner"><div><a class="brand" href="/"><img src="/assets/logo.svg" alt="Chirp"><span>Chirp</span></a><h1>Tu espacio para chirpear con estilo.</h1><p>Rosa, rápido y con una experiencia social que se siente propia.</p></div><div class="chip">🐣 Patito rosa incluido</div></div></section>

          <label class="field"><span>Email</span><div class="fieldbox"><input id="resetEmail" type="email" required placeholder="vos@email.com"></div></label>

        </form>
