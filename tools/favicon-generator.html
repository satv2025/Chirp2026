<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de favicon · Chirp</title>
    <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
    <style>
      @import url('https://solargentinotv.com.ar/assets/fonts/Gilroy/Gilroy.css');
      * { box-sizing: border-box; font-family: Gilroy, sans-serif; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #321325;
        background: radial-gradient(circle at 20% 10%, #ffc1df, transparent 24rem), linear-gradient(135deg, #fff3fa, #ffe1f1);
      }
      main {
        width: min(920px, calc(100% - 2rem));
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        align-items: center;
      }
      section {
        border: 1px solid rgba(237, 47, 138, .18);
        border-radius: 32px;
        background: rgba(255,255,255,.75);
        box-shadow: 0 22px 70px rgba(207, 22, 112, .18);
        padding: 1.2rem;
        backdrop-filter: blur(22px);
      }
      h1 { margin: 0; font-size: clamp(2.2rem, 6vw, 4.8rem); line-height: .9; letter-spacing: -.08em; }
      p { color: #8d6379; line-height: 1.6; }
      .preview { display: grid; place-items: center; min-height: 420px; }
      svg { width: min(340px, 75vw); height: auto; filter: drop-shadow(0 22px 35px rgba(207, 22, 112, .24)); }
      .controls { display: grid; gap: .75rem; margin-top: 1rem; }
      button, select, input {
        min-height: 44px;
        border: 1px solid rgba(237, 47, 138, .18);
        border-radius: 999px;
        background: #fff;
        padding: .75rem 1rem;
        color: #cf1670;
        font-weight: 900;
      }
      button { cursor: pointer; background: linear-gradient(135deg, #ff4fa3, #cf1670); color: #fff; }
      label { display: grid; gap: .45rem; color: #a70f59; font-weight: 900; }
      @media (max-width: 760px) { main { grid-template-columns: 1fr; padding: 1rem 0; } }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Favicon rosa para Chirp.</h1>
        <p>Generá un pollito o patito rosa, descargá el SVG y reemplazá <code>assets/favicon.svg</code>.</p>
        <div class="controls">
          <label>
            Animal
            <select id="animal">
              <option value="duck">Patito</option>
              <option value="chick">Pollito</option>
            </select>
          </label>
          <label>
            Rosa principal
            <input id="pink" type="color" value="#ff4fa3" />
          </label>
          <button id="randomize" type="button">Random rosa</button>
          <button id="download" type="button">Descargar favicon.svg</button>
        </div>
      </section>
      <section class="preview" id="preview"></section>
    </main>

    <script>
      const preview = document.querySelector('#preview');
      const animal = document.querySelector('#animal');
      const pink = document.querySelector('#pink');
      const randomize = document.querySelector('#randomize');
      const download = document.querySelector('#download');
      const palette = ['#ff4fa3', '#ff6bb0', '#ed2f8a', '#ff78bd', '#db2777'];

      function shade(hex, amount) {
        const n = parseInt(hex.slice(1), 16);
        const r = Math.max(0, Math.min(255, (n >> 16) + amount));
        const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + amount));
        const b = Math.max(0, Math.min(255, (n & 255) + amount));
        return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
      }

      function svg() {
        const main = pink.value;
        const light = shade(main, 72);
        const dark = shade(main, -48);
        const isDuck = animal.value === 'duck';
        const head = isDuck
          ? '<path d="M15 35c0-14 11-25 25-25 9 0 16 4 21 10 2 3 1 7-3 8l-6 1c4 4 6 10 6 16 0 12-10 21-22 21H20C10 66 2 58 2 48c0-8 5-14 13-16v3Z" fill="url(#p)" transform="translate(3 -4) scale(.9)"/>'
          : '<circle cx="31" cy="32" r="23" fill="url(#p)"/><path d="M19 15c5-10 16-10 19 0" stroke="' + dark + '" stroke-width="6" stroke-linecap="round" fill="none"/>';
        const beak = isDuck
          ? '<path d="M38 29c6 0 13 1 20 5 2 1 2 4 0 5-6 3-13 5-20 4 2-5 2-9 0-14Z" fill="#ffb347"/>'
          : '<path d="M36 33l18 8-18 7c2-5 2-10 0-15Z" fill="#ffb347"/>';
        return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="p" x1="8" y1="5" x2="55" y2="59"><stop stop-color="${light}"/><stop offset=".55" stop-color="${main}"/><stop offset="1" stop-color="${dark}"/></linearGradient></defs><rect width="64" height="64" rx="18" fill="#fff3fa"/>${head}${beak}<circle cx="35" cy="24" r="3.3" fill="#321325"/><circle cx="36" cy="23" r="1" fill="#fff"/></svg>`;
      }

      function render() { preview.innerHTML = svg(); }
      animal.addEventListener('change', render);
      pink.addEventListener('input', render);
      randomize.addEventListener('click', () => { pink.value = palette[Math.floor(Math.random() * palette.length)]; animal.value = Math.random() > .5 ? 'duck' : 'chick'; render(); });
      download.addEventListener('click', () => {
        const blob = new Blob([svg()], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'favicon.svg';
        a.click();
        URL.revokeObjectURL(url);
      });
      render();
    </script>
  </body>
</html>
